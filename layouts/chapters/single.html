{{ define "main" }}

<!-- Reading progress bar -->
<div class="progress-bar" id="progress"></div>

{{ partial "nav.html" . }}

<article class="chapter">
  <header class="chapter-header">
    <span class="chapter-number">Chapter {{ .Params.weight }}</span>
    <h1 class="chapter-title">{{ .Params.short_title | default .Title }}</h1>
    {{ with .Params.opening }}
    <p class="chapter-opening">{{ . }}</p>
    {{ end }}
  </header>

  <div class="chapter-body">
    {{ .Content }}
  </div>
</article>

{{ partial "chapter-nav.html" . }}

<script>
  // Reading progress bar
  window.addEventListener('scroll', function() {
    const article = document.querySelector('.chapter');
    const bar = document.getElementById('progress');
    if (!article || !bar) return;

    const rect = article.getBoundingClientRect();
    const articleTop = rect.top + window.scrollY;
    const articleHeight = article.offsetHeight;
    const windowHeight = window.innerHeight;
    const scrolled = window.scrollY - articleTop + windowHeight;
    const progress = Math.min(Math.max(scrolled / articleHeight * 100, 0), 100);
    bar.style.width = progress + '%';
  });
</script>

{{ end }}
